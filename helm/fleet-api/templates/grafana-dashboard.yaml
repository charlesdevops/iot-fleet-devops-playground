{{- if .Values.grafanaDashboard.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet-api.fullname" . }}-dashboard
  labels:
    {{- include "fleet-api.labels" . | nindent 4 }}
    {{ .Values.grafanaDashboard.label }}: {{ .Values.grafanaDashboard.labelValue | quote }}
data:
  fleet-api.json: |-
    {{- .Files.Get "dashboards/fleet-api.json" | nindent 4 }}
{{- end }}
