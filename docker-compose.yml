networks:
  fleet-net:
    driver: bridge

services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,iam,sts,kms
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      # Bind to 0.0.0.0 so the app container can reach LocalStack over the Docker network
      - GATEWAY_LISTEN=0.0.0.0:4566
    # Docker socket removed — only needed for Lambda, not used here (S3/DynamoDB/IAM/STS only)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: ./app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_TABLE=devices-local
      - S3_BUCKET=fleet-firmware-local
      - AWS_ENDPOINT_URL=http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fleet-net
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
